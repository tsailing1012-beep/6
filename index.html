<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>給你的專屬旋律</title>
    <style>
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            /* 薄荷湖水綠漸層 */
            background: linear-gradient(135deg, #e0f2f1 0%, #80cbc4 50%, #4db6ac 100%);
            color: #004d40;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 30px;
            padding: 30px 15px;
            width: 92%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 77, 64, 0.15);
            text-align: center;
        }

        h1 {
            font-size: 1rem;
            margin: 0 0 8px 0;
            color: #00796b;
            font-weight: 400;
            letter-spacing: 1px;
        }

        p.sub-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #004d40;
            margin: 0 0 20px 0;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .spotify-wrapper {
            background: #282828;
            border-radius: 12px;
            overflow: hidden;
            min-height: 352px;
            line-height: 0;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .footer {
            margin-top: 25px;
            font-size: 0.82rem;
            white-space: nowrap; 
            letter-spacing: 0.5px;
            color: #00695c;
            display: block;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>謝謝你帶我認識離婚傳說</h1>
        <p class="sub-title">我承認這是你先看到的XD</p>
        
        <div class="spotify-wrapper">
            <iframe 
                src="https://open.spotify.com/embed/track/2ektCq0B2HZyL38eRbI70W?utm_source=generator" 
                width="100%" 
                height="352" 
                frameborder="0" 
                allowtransparency="true" 
                allow="encrypted-media">
            </iframe>
        </div>

        <div class="footer">
            未來的有一天，我們也要一起去聽現場！
        </div>
    </div>

</body>
</html>
